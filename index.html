<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product Manager</title>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    

   <header class="header">

    <h1>Product Manager</h1>
<div class="tech-badge">
            JSON + LocalStorage + JavaScript
        </div>
    <button id="clearCacheBtn" class="clear-cache-btn">
        <i class="fa-solid fa-trash"></i>
        Clear Cache
    </button>

</header>

  

    <main class="container">

        

        <aside class="sidebar">

            

            <div class="tabs">

                <button class="tab-btn active" id="addTab">
                    Add Product
                </button>

                <button class="tab-btn" id="updateTab">
                    Update Product
                </button>

            </div>

           

            <div class="form-area">

                <h2 id="formHeading">
                    ADD NEW PRODUCT
                </h2>

              

                <div class="form-group">
    <label for="title">TITLE</label>

    <input type="text" id="title" placeholder="e.g. iPhone 15">

    <select id="titleDropdown" style="display:none;"></select>
</div>

                <!-- Price -->

                <div class="form-group">

                    <label for="price" id="Price">
                        PRICE
                    </label>

                    <input
                        type="number"
                        id="price"
                        placeholder="e.g. 99.99">

                </div>

                <!-- Stock -->

                <div class="form-group">

                    <label for="stock" id="Stock">
                        STOCK
                    </label>

                    <input
                        type="number"
                        id="stock"
                        placeholder="e.g. 10">

                </div>

                <!-- SKU -->

                <div class="form-group">

                    <label for="sku" id="Sku">
                        SKU
                    </label>

                    <input
                        type="text"
                        id="sku"
                        placeholder="e.g. APL-001">

                </div>

                <!-- Button -->

                <button class="submit-btn" id="submitBtn" type="button">

                    Add Product

                </button>

            </div>

        </aside>


        <section class="content">

            <div class="content-header">

                <div>

                    <h2>Product List</h2>

                    <p>
                        Manage your inventory below
                    </p>

                </div>

                <span class="item-count" id="itemCount">
                    0
                </span>

            </div>

            <div class="table-container">

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>TITLE</th>
                <th>PRICE</th>
                <th>STOCK</th>
                <th>SKU</th>
                <th>ACTIONS</th>
                
            </tr>
        </thead>

        <tbody id="productBody">

            

        </tbody>

    </table>
<div class="fetch-container">
    <button id="fetchBtn" class="fetch-btn" style="display: none;">
        Fetch Products
    </button>
</div>
</div>

        </section>

    </main>
<script src="script.js"></script>
</body>

</html>
